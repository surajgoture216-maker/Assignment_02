<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<style>

.dashboard-container{
    width:350px;
    background:white;
    padding:30px;
    border-radius:12px;
    text-align:center;
    margin:150px auto;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}


.dashboard-buttons{
    display:flex;
    justify-content:space-around;
    margin-top:20px;
}


.dashboard-buttons button{
    padding:10px 18px;
    border:none;
    border-radius:6px;
    background:#4CAF50;
    color:white;
    cursor:pointer;
    font-size:14px;
}


.logout{
    background:#e74c3c;
}

.logout:hover{
    background:#c0392b;
}
</style>
</head>

<body>

<div class="dashboard-container">

<h2>Welcome to My Dashboard</h2>

<div class="dashboard-buttons">
<a href="Reset_Password.html">
<button>Reset Password</button>
</a>

<a href="LogInPage.html">
<button class="logout">Logout</button>
</a>
</div>

</div>

</body>
</html>
